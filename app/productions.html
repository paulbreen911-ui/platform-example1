<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productions — Production Central</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>

<nav class="nav" id="pc-nav"></nav>

<div class="shell">
  <aside class="sidebar" id="pc-sidebar"></aside>

  <main class="main">

    <div class="ph-row">
      <div>
        <div class="ph-ey">Show management</div>
        <div class="ph-title">My <em>productions</em></div>
      </div>
      <a class="btn btn-gold" href="new-production.html">+ New production</a>
    </div>

    <!-- Filter bar -->
    <div class="flex gap-6 mb-20" id="filter-bar">
      <button class="btn btn-ghost btn-sm active-filter" onclick="filterProds('all', this)">All</button>
      <button class="btn btn-ghost btn-sm" onclick="filterProds('live', this)">Live now</button>
      <button class="btn btn-ghost btn-sm" onclick="filterProds('active', this)">Active</button>
      <button class="btn btn-ghost btn-sm" onclick="filterProds('planning', this)">Planning</button>
      <button class="btn btn-ghost btn-sm" onclick="filterProds('draft', this)">Draft</button>
      <button class="btn btn-ghost btn-sm" onclick="filterProds('wrapped', this)">Wrapped</button>
    </div>

    <!-- Productions list -->
    <div id="prod-list" style="display:flex;flex-direction:column;gap:10px"></div>

  </main>
</div>

<script>window.PC_PAGE = 'productions'; window.PC_INIT = 'productions';</script>
<script src="../shared/nav.js"></script>
<script>

const PRODUCTIONS = [
  {
    id: 'gala',
    name: 'Summerset Corporate Gala',
    status: 'live',
    color: '#E24B4A',
    venue: 'Grand Ballroom, Las Vegas NV',
    dates: 'Jun 12–15, 2025',
    guests: '340',
    budget: '$86K',
    progress: 72,
    progressLabel: 'Load-in Jun 12',
    pill: 'pill-live',
    pillText: 'Live tonight',
    tags: ['Corporate event', 'Las Vegas'],
    team: 6,
    tasks: '2 open',
  },
  {
    id: 'summit',
    name: 'Tech Summit 2025',
    status: 'planning',
    color: '#378ADD',
    venue: 'Convention Center, Austin TX',
    dates: 'Aug 1–4, 2025',
    guests: '1,200',
    budget: '$142K',
    progress: 34,
    progressLabel: '96 days out',
    pill: 'pill-plan',
    pillText: 'Planning',
    tags: ['Conference', 'Austin TX'],
    team: 8,
    tasks: '8 open',
  },
  {
    id: 'dinner',
    name: 'Meridian Holiday Dinner',
    status: 'draft',
    color: '#1D9E75',
    venue: 'The Rooftop, Los Angeles CA',
    dates: 'Dec 5, 2025',
    guests: '120',
    budget: '$28K',
    progress: 8,
    progressLabel: 'Draft stage',
    pill: 'pill-draft',
    pillText: 'Draft',
    tags: ['Private event', 'Los Angeles'],
    team: 3,
    tasks: '1 open',
  },
  {
    id: 'apex',
    name: 'Product Launch — Apex Series',
    status: 'wrapped',
    color: '#7F77DD',
    venue: 'Studio B, New York City',
    dates: 'May 22, 2025',
    guests: '80',
    budget: '$44K',
    progress: 100,
    progressLabel: 'Wrapped May 22',
    pill: 'pill-wrap',
    pillText: 'Wrapped',
    tags: ['Product launch', 'New York'],
    team: 5,
    tasks: '0 open',
  },
];

let activeFilter = 'all';

function filterProds(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('#filter-bar button').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  renderProds();
}

function renderProds() {
  const el = document.getElementById('prod-list');
  if (!el) return;

  const filtered = PRODUCTIONS.filter(p => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'live') return p.status === 'live';
    if (activeFilter === 'active') return p.status === 'live' || p.status === 'active';
    if (activeFilter === 'planning') return p.status === 'planning';
    if (activeFilter === 'draft') return p.status === 'draft';
    if (activeFilter === 'wrapped') return p.status === 'wrapped';
    return true;
  });

  if (filtered.length === 0) {
    el.innerHTML = `<div style="padding:48px;text-align:center;color:var(--text-3);background:var(--dark-2);border:0.5px solid var(--border);border-radius:12px">
      <div style="font-size:32px;margin-bottom:12px">🎭</div>
      <div style="font-size:13px;margin-bottom:6px">No productions found</div>
      <div style="font-size:12px">Try a different filter or <a href="new-production.html" style="color:var(--gold)">create a new production</a>.</div>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(p => `
    <a href="production.html?id=${p.id}" style="text-decoration:none">
      <div class="card clickable" style="overflow:visible">
        <div style="display:grid;grid-template-columns:5px 1fr">
          <div style="background:${p.color};border-radius:11px 0 0 11px"></div>
          <div style="padding:20px 24px">

            <!-- Top row -->
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px">
              <div>
                <div style="font-size:16px;font-weight:500;color:var(--text-1);margin-bottom:6px">${p.name}</div>
                <div style="font-size:12px;color:var(--text-3);display:flex;gap:16px;flex-wrap:wrap">
                  <span>📍 ${p.venue}</span>
                  <span>🗓 ${p.dates}</span>
                  <span>👥 ${p.guests} guests</span>
                  <span>💰 ${p.budget}</span>
                </div>
              </div>
              <span class="pill ${p.pill}" style="flex-shrink:0">${p.pillText}</span>
            </div>

            <!-- Stats row -->
            <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
              <div style="flex:1;min-width:120px">
                <div style="font-size:10px;color:var(--text-3);margin-bottom:4px;display:flex;justify-content:space-between">
                  <span>Tasks complete</span><span>${p.progress}%</span>
                </div>
                <div class="prog-bar"><div class="prog-fill" style="width:${p.progress}%;background:${p.color}"></div></div>
              </div>
              <div style="display:flex;gap:20px;flex-shrink:0">
                <div style="text-align:center">
                  <div style="font-size:16px;font-weight:500;color:var(--text-1)">${p.team}</div>
                  <div style="font-size:10px;color:var(--text-3)">Team</div>
                </div>
                <div style="text-align:center">
                  <div style="font-size:16px;font-weight:500;color:${p.tasks === '0 open' ? 'var(--text-3)' : p.status === 'live' ? 'var(--live)' : 'var(--text-1)'}">${p.tasks}</div>
                  <div style="font-size:10px;color:var(--text-3)">Tasks</div>
                </div>
                <div style="text-align:center">
                  <div style="font-size:12px;color:var(--text-2);font-weight:500">${p.progressLabel}</div>
                  <div style="font-size:10px;color:var(--text-3)">Status</div>
                </div>
              </div>
            </div>

            <!-- Tags -->
            <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
              ${p.tags.map(t => `<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.05);color:var(--text-3);border:0.5px solid var(--border)">${t}</span>`).join('')}
              <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.05);color:var(--text-3);border:0.5px solid var(--border)">${p.team} crew members</span>
            </div>

          </div>
        </div>
      </div>
    </a>
  `).join('');
}

// Active filter style
const style = document.createElement('style');
style.textContent = `.active-filter { background: var(--dark-2) !important; color: var(--text-1) !important; border-color: var(--border-md) !important; }`;
document.head.appendChild(style);



</script>
</body>
</html>
