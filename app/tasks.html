<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — Production Central</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>

<nav class="nav" id="pc-nav"></nav>

<div class="shell">
  <aside class="sidebar" id="pc-sidebar"></aside>

  <main class="main">

    <div class="ph-row">
      <div>
        <div class="ph-ey">All work</div>
        <div class="ph-title">My <em>tasks</em></div>
      </div>
      <button class="btn btn-gold" onclick="openModal('add-task')">+ Add task</button>
    </div>

    <!-- Stats row -->
    <div class="stat-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:22px">
      <div class="stat" style="cursor:default">
        <div class="stat-lbl">Total open</div>
        <div class="stat-val" id="count-open">9</div>
        <div class="stat-sub">across all work</div>
      </div>
      <div class="stat" style="cursor:default">
        <div class="stat-lbl">Overdue</div>
        <div class="stat-val warn" id="count-overdue">3</div>
        <div class="stat-sub warn">need attention now</div>
      </div>
      <div class="stat" style="cursor:default">
        <div class="stat-lbl">Due this week</div>
        <div class="stat-val" id="count-week">3</div>
        <div class="stat-sub">May 3 – May 10</div>
      </div>
      <div class="stat" style="cursor:default">
        <div class="stat-lbl">Completed</div>
        <div class="stat-val" id="count-done" style="color:#66BB6A">3</div>
        <div class="stat-sub up">this week</div>
      </div>
    </div>

    <!-- Filter + view -->
    <div class="flex flex-between mb-16">
      <div class="flex gap-6" id="filter-bar">
        <button class="btn btn-ghost btn-sm active-filter" onclick="setFilter('all',this)">All</button>
        <button class="btn btn-ghost btn-sm" onclick="setFilter('overdue',this)">Overdue</button>
        <button class="btn btn-ghost btn-sm" onclick="setFilter('productions',this)">Productions</button>
        <button class="btn btn-ghost btn-sm" onclick="setFilter('projects',this)">Projects</button>
        <button class="btn btn-ghost btn-sm" onclick="setFilter('done',this)">Completed</button>
      </div>
      <div class="flex gap-6">
        <select class="form-sel" style="padding:5px 11px;font-size:12px;width:auto" onchange="setSortBy(this.value)">
          <option value="due">Sort by due date</option>
          <option value="prod">Sort by production</option>
          <option value="alpha">Sort alphabetically</option>
        </select>
      </div>
    </div>

    <!-- Task list -->
    <div id="task-list"></div>

  </main>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal-add-task" onclick="if(event.target===this)closeModal('add-task')">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">Add task</div>
      <button class="modal-close" onclick="closeModal('add-task')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grp">
        <div class="form-lbl">Task name</div>
        <input class="form-inp" type="text" id="new-task-name" placeholder="What needs to get done?">
      </div>
      <div class="form-2">
        <div class="form-grp">
          <div class="form-lbl">Due date</div>
          <input class="form-inp" type="date" id="new-task-date">
        </div>
        <div class="form-grp">
          <div class="form-lbl">Assign to</div>
          <select class="form-sel" id="new-task-assign">
            <option>Jordan Kim (me)</option>
            <option>Sarah M.</option>
            <option>Tom R.</option>
            <option>Dana L.</option>
            <option>Mara L.</option>
            <option>Unassigned</option>
          </select>
        </div>
      </div>
      <div class="form-grp">
        <div class="form-lbl">Production / project</div>
        <select class="form-sel" id="new-task-prod">
          <option>Summerset Corporate Gala</option>
          <option>Tech Summit 2025</option>
          <option>Meridian Holiday Dinner</option>
          <option>Sphere Residency Build</option>
          <option>Downtown Venue Buildout</option>
          <option>General</option>
        </select>
      </div>
      <div class="form-grp">
        <div class="form-lbl">Notes</div>
        <textarea class="form-inp" rows="2" placeholder="Optional notes…" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal('add-task')">Cancel</button>
      <button class="btn btn-gold" onclick="addTask()">Add task</button>
    </div>
  </div>
</div>

<script>window.PC_PAGE = 'tasks'; window.PC_INIT = 'tasks';</script>
<script src="../shared/nav.js"></script>
<script>

const TASKS = [
  // Overdue
  { id:1,  name:'Confirm AV vendor contract',                    ref:'Tech Summit 2025',    type:'production', due:'Apr 27', overdue:true,  done:false, assign:'Jordan K.' },
  { id:2,  name:'Submit permit application — loading dock',      ref:'Sphere Residency',    type:'project',    due:'Apr 28', overdue:true,  done:false, assign:'Tom R.' },
  { id:3,  name:'Review insurance certificates from all vendors',ref:'Summerset Gala',      type:'production', due:'May 1',  overdue:true,  done:false, assign:'Jordan K.' },
  // This week
  { id:4,  name:'Send runsheet to venue coordinator',            ref:'Summerset Gala',      type:'production', due:'May 3',  overdue:false, done:false, assign:'Jordan K.' },
  { id:5,  name:'Review structural engineering report',          ref:'Downtown Venue',      type:'project',    due:'May 8',  overdue:false, done:false, assign:'Dana K.' },
  { id:6,  name:'Get F&B headcount from client',                ref:'Meridian Dinner',     type:'production', due:'May 10', overdue:false, done:false, assign:'Jordan K.' },
  // Upcoming
  { id:7,  name:'Finalize cable routing plan with architect',    ref:'Sphere Residency',    type:'project',    due:'May 15', overdue:false, done:false, assign:'Jordan K.' },
  { id:8,  name:'Order Dante switches — 48-port PoE',           ref:'Sphere Residency',    type:'project',    due:'May 20', overdue:false, done:false, assign:'Unassigned' },
  { id:9,  name:'Confirm stage dimensions with venue',          ref:'Tech Summit 2025',    type:'production', due:'May 25', overdue:false, done:false, assign:'Mara L.' },
  // Done
  { id:10, name:'Finalize menu selections with catering',        ref:'Summerset Gala',      type:'production', due:'Apr 22', overdue:false, done:true,  assign:'Jordan K.' },
  { id:11, name:'Sign Dante network design contract',            ref:'Sphere Residency',    type:'project',    due:'Apr 10', overdue:false, done:true,  assign:'Jordan K.' },
  { id:12, name:'Confirm final guest count with client',         ref:'Summerset Gala',      type:'production', due:'Apr 20', overdue:false, done:true,  assign:'Jordan K.' },
];

let activeFilter = 'all';
let sortBy = 'due';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('#filter-bar button').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  renderTasks();
}

function setSortBy(v) {
  sortBy = v;
  renderTasks();
}

function renderTasks() {
  const el = document.getElementById('task-list');
  if (!el) return;

  let tasks = TASKS.filter(t => {
    if (activeFilter === 'all')         return !t.done;
    if (activeFilter === 'overdue')     return t.overdue && !t.done;
    if (activeFilter === 'productions') return t.type === 'production' && !t.done;
    if (activeFilter === 'projects')    return t.type === 'project' && !t.done;
    if (activeFilter === 'done')        return t.done;
    return true;
  });

  if (sortBy === 'alpha') tasks = [...tasks].sort((a,b) => a.name.localeCompare(b.name));
  if (sortBy === 'prod')  tasks = [...tasks].sort((a,b) => a.ref.localeCompare(b.ref));

  if (tasks.length === 0) {
    el.innerHTML = `<div style="padding:48px;text-align:center;color:var(--text-3);background:var(--dark-2);border:0.5px solid var(--border);border-radius:12px">
      <div style="font-size:32px;margin-bottom:12px">✅</div>
      <div style="font-size:13px;margin-bottom:6px">All clear</div>
      <div style="font-size:12px">No tasks in this category.</div>
    </div>`;
    return;
  }

  // Group by section when showing all
  if (activeFilter === 'all') {
    const overdue   = tasks.filter(t => t.overdue);
    const thisWeek  = tasks.filter(t => !t.overdue && ['May 3','May 4','May 5','May 6','May 7','May 8','May 9','May 10'].some(d => t.due.includes(d.split(' ')[1])));
    const upcoming  = tasks.filter(t => !t.overdue && !['May 3','May 4','May 5','May 6','May 7','May 8','May 9','May 10'].some(d => t.due.includes(d.split(' ')[1])));

    el.innerHTML =
      renderGroup('Overdue', overdue, 'sd-overdue') +
      renderGroup('This week', thisWeek, 'sd-week') +
      renderGroup('Upcoming', upcoming, 'sd-upcoming');
  } else {
    el.innerHTML = `<div class="card">${tasks.map(t => renderTaskRow(t)).join('')}</div>`;
  }

  updateCounts();
}

function renderGroup(label, tasks, cls) {
  if (tasks.length === 0) return '';
  return `<div class="card" style="margin-bottom:12px">
    <div class="section-divider ${cls}"><div class="section-divider-label">${label}</div></div>
    ${tasks.map(t => renderTaskRow(t)).join('')}
  </div>`;
}

function renderTaskRow(t) {
  const typeTag = t.type === 'project'
    ? `<span style="font-size:9px;padding:1px 6px;border-radius:3px;background:var(--teal-dim);color:#4DB6AC;border:0.5px solid rgba(42,140,122,.3)">Project</span>`
    : `<span style="font-size:9px;padding:1px 6px;border-radius:3px;background:var(--blue-dim);color:#5B9FE0;border:0.5px solid rgba(42,92,140,.3)">Production</span>`;

  return `<div class="task-row" id="task-row-${t.id}">
    <div class="chk${t.done?' done':''}" onclick="toggleTaskById(${t.id},this)"></div>
    <div class="tb">
      <div class="tn${t.done?' done':''}">${t.name}</div>
      <div class="tr-ref" style="display:flex;align-items:center;gap:8px;margin-top:3px">
        ${typeTag}
        <span>${t.ref}</span>
        <span>· ${t.assign}</span>
      </div>
    </div>
    <div class="td${t.overdue&&!t.done?' over':''}">${t.due}</div>
  </div>`;
}

function toggleTaskById(id, el) {
  const task = TASKS.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  el.classList.toggle('done');
  const nameEl = el.closest('.task-row')?.querySelector('.tn');
  if (nameEl) nameEl.classList.toggle('done');
  updateCounts();
}

function updateCounts() {
  const open    = TASKS.filter(t => !t.done).length;
  const overdue = TASKS.filter(t => t.overdue && !t.done).length;
  const week    = TASKS.filter(t => !t.done && !t.overdue && ['May 3','May 8','May 10'].includes(t.due)).length;
  const done    = TASKS.filter(t => t.done).length;
  const co = document.getElementById('count-open');
  const cod = document.getElementById('count-overdue');
  const cow = document.getElementById('count-week');
  const cd = document.getElementById('count-done');
  if (co)  co.textContent  = open;
  if (cod) cod.textContent = overdue;
  if (cow) cow.textContent = week;
  if (cd)  cd.textContent  = done;
}

function addTask() {
  const name = document.getElementById('new-task-name')?.value?.trim();
  if (!name) return;
  const date  = document.getElementById('new-task-date')?.value || 'TBD';
  const prod  = document.getElementById('new-task-prod')?.value || 'General';
  const assign = document.getElementById('new-task-assign')?.value || 'Unassigned';
  TASKS.unshift({
    id: Date.now(),
    name,
    ref: prod,
    type: ['Sphere Residency Build','Downtown Venue Buildout'].includes(prod) ? 'project' : 'production',
    due: date,
    overdue: false,
    done: false,
    assign,
  });
  closeModal('add-task');
  renderTasks();
  if (document.getElementById('new-task-name')) document.getElementById('new-task-name').value = '';
}

const style = document.createElement('style');
style.textContent = `.active-filter{background:var(--dark-2)!important;color:var(--text-1)!important;border-color:var(--border-md)!important}`;
document.head.appendChild(style);


</script>
</body>
</html>
