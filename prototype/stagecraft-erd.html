<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stagecraft — Data Model</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #141412;
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    padding: 40px 32px 60px;
  }
  h1 {
    font-family: Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    color: #e8e6de;
    margin-bottom: 6px;
    font-style: italic;
  }
  .sub {
    font-size: 12px;
    color: #666;
    margin-bottom: 36px;
    letter-spacing: 0.5px;
  }
  #erd svg { width: 100% !important; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<h1>Stagecraft — data model</h1>
<p class="sub">Core tables and relationships · v1</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"DM Sans", system-ui, sans-serif',
  themeVariables: {
    darkMode: true,
    fontSize: '13px',
    fontFamily: '"DM Sans", system-ui, sans-serif',
    background: '#141412',
    primaryColor: '#242420',
    primaryBorderColor: '#3a3a34',
    primaryTextColor: '#c8c6bc',
    lineColor: '#555550',
    textColor: '#c8c6bc',
    attributeBackgroundColorEven: '#1e1e1a',
    attributeBackgroundColorOdd: '#1a1a16',
    edgeLabelBackground: '#141412',
    tertiaryColor: '#1e1e1a',
  },
});

const diagram = `erDiagram
  USERS {
    uuid id PK
    string clerk_id FK
    string username
    string full_name
    string email
    string avatar_url
    string bio
    string location
    string role
    timestamp created_at
    timestamp updated_at
  }
  EVENTS {
    uuid id PK
    uuid owner_id FK
    string title
    string event_type
    string status
    date event_date
    string venue_name
    string venue_city
    int guest_count
    decimal budget_total
    text notes
    timestamp created_at
  }
  EVENT_TEAM {
    uuid id PK
    uuid event_id FK
    uuid user_id FK
    string role
    timestamp joined_at
  }
  VENDORS {
    uuid id PK
    uuid added_by FK
    string name
    string category
    string city
    string state
    string website
    float avg_rating
    timestamp created_at
  }
  VENDOR_REVIEWS {
    uuid id PK
    uuid vendor_id FK
    uuid user_id FK
    int rating
    text body
    timestamp created_at
  }
  POSTS {
    uuid id PK
    uuid author_id FK
    string title
    string category
    text body
    int view_count
    timestamp created_at
  }
  COMMENTS {
    uuid id PK
    uuid post_id FK
    uuid author_id FK
    text body
    timestamp created_at
  }
  RESOURCES {
    uuid id PK
    uuid uploaded_by FK
    string title
    string type
    string file_url
    int download_count
    timestamp created_at
  }
  USERS ||--o{ EVENTS : owns
  EVENTS ||--o{ EVENT_TEAM : has
  USERS ||--o{ EVENT_TEAM : joins
  USERS ||--o{ POSTS : writes
  POSTS ||--o{ COMMENTS : has
  USERS ||--o{ COMMENTS : writes
  USERS ||--o{ VENDORS : adds
  VENDORS ||--o{ VENDOR_REVIEWS : receives
  USERS ||--o{ VENDOR_REVIEWS : writes
  USERS ||--o{ RESOURCES : uploads
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});

const svgEl = document.querySelector('#erd svg');
if (svgEl) {
  svgEl.style.background = '#141412';
  svgEl.style.borderRadius = '12px';
  svgEl.style.padding = '24px';
}
</script>
</body>
</html>
